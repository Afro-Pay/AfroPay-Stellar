apiVersion: v1
kind: Service
metadata:
  name: rust-worker-metrics
  namespace: afropay
  labels:
    app: rust-worker
spec:
  ports:
  - port: 9898
    targetPort: 9898
    name: metrics
  selector:
    app: rust-worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rust-worker
  namespace: afropay
  labels:
    app: rust-worker
spec:
  replicas: 1 # Scale based on Redis queue depth; verify settlement idempotency before scaling horizontally
  selector:
    matchLabels:
      app: rust-worker
  template:
    metadata:
      labels:
        app: rust-worker
    spec:
      containers:
      - name: rust-worker
        image: registry.example.com/afropay-stellar/rust-worker:latest # Replace with real image tag (e.g. Git SHA)
        ports:
        - containerPort: 9898
          name: metrics
        envFrom:
        - configMapRef:
            name: afropay-config
        env:
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: afropay-secrets
              key: REDIS_URL
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "250m"
            memory: 256Mi
        # Runs process check for liveness/readiness
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - ps -ef | grep -q '[w]orker'
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 15
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - ps -ef | grep -q '[w]orker'
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 15
