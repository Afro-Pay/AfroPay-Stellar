apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: afropay
  labels:
    app: api
spec:
  ports:
  - port: 3001
    targetPort: 3001
    name: http
  selector:
    app: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: afropay
  labels:
    app: api
spec:
  replicas: 2 # Standard multi-replica setup for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: registry.example.com/afropay-stellar/api:latest # Replace with real image tag (e.g. Git SHA)
        ports:
        - containerPort: 3001
          name: http
        envFrom:
        - configMapRef:
            name: afropay-config
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: afropay-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: afropay-secrets
              key: REDIS_URL
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: afropay-secrets
              key: JWT_SECRET
        - name: ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: afropay-secrets
              key: ENCRYPTION_KEY
        resources:
          limits:
            cpu: "1"
            memory: 1Gi
          requests:
            cpu: "250m"
            memory: 512Mi
        # NOTE: If /health is not yet fully implemented or needs auth,
        # you can temporarily replace the httpGet probes below with a tcpSocket check:
        # livenessProbe:
        #   tcpSocket:
        #     port: 3001
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 15
          timeoutSeconds: 5
          periodSeconds: 15
