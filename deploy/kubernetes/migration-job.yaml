apiVersion: batch/v1
kind: Job
metadata:
  name: api-migration
  namespace: afropay
  labels:
    app: api-migration
spec:
  template:
    metadata:
      labels:
        app: api-migration
    spec:
      containers:
      - name: migration
        image: registry.example.com/afropay-stellar/api:latest # Replace with target tag for release
        command: ["/bin/sh", "-c", "npx prisma migrate deploy"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: afropay-secrets
              key: DATABASE_URL
      restartPolicy: OnFailure
  backoffLimit: 4
