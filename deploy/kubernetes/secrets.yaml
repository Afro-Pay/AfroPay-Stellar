apiVersion: v1
kind: Secret
metadata:
  name: afropay-secrets
  namespace: afropay
type: Opaque
stringData:
  # NOTE: Replace these values with secure production values before deploying.
  # If using a secret injection tool (like Vault, AWS Secrets Manager, or ExternalSecrets),
  # this file acts as a template/schema.
  POSTGRES_PASSWORD: "CHANGE_ME_SECURE_POSTGRES_PASSWORD"
  DATABASE_URL: "postgresql://remitx:CHANGE_ME_SECURE_POSTGRES_PASSWORD@postgres-service.afropay.svc.cluster.local:5432/remitx?sslmode=require"
  REDIS_URL: "rediss://:CHANGE_ME_SECURE_REDIS_PASSWORD@redis-service.afropay.svc.cluster.local:6379"
  JWT_SECRET: "PLACEHOLDER_JWT_SECRET_AT_LEAST_256_BITS_OF_ENTROPY"
  # ENCRYPTION_KEY must be exactly 32 random bytes encoded as 64 hex characters.
  ENCRYPTION_KEY: "PLACEHOLDER_64_CHARACTER_HEXADECIMAL_MASTER_ENCRYPTION_KEY"
