apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: afropay-ingress
  namespace: afropay
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: afropay.example.com # Replace with your actual domain
    http:
      paths:
      - path: /api(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: api-service
            port:
              number: 3001
      - path: /(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: frontend-service
            port:
              number: 3000
  tls:
  - hosts:
    - afropay.example.com
    secretName: afropay-tls
